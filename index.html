/* ========== DISC LANDING PAGE (Moodle-style) ========== */
function chooseMode(disc, forceMode){
  if(forceMode){ startSession(disc,forceMode); return; }
  playClick();
  showDiscPage(disc);
}

function showDiscPage(disc){
  const key=disc===null?'__all__':disc;
  const as=(profile.activeSessions||{})[key];
  if(as && !as.isRandom40 && as.queue && as.queue.length>0){
    const done=as.firstSeen?.length||0, total=as.total||25;
    openOverlay(`<div class="modal" style="text-align:center;max-width:400px">
      <h2>Незавершённый тест</h2>
      <p class="sub">${disc||t('all_disc')} · Пройдено ${done} из ${total} вопросов</p>
      <div class="mode-list" style="margin-top:16px">
        <button class="mode-btn" id="resumeBtn"><b>Продолжить</b><span>С того места, где остановился</span></button>
        <button class="mode-btn" id="newTestBtn"><b>Начать новый тест</b><span>Прогресс незавершённого будет потерян</span></button>
      </div></div>`);
    document.getElementById('resumeBtn').onclick=()=>{
      closeOverlay();
      if(restoreSession(as)){ show('quiz'); document.getElementById('qDisc').textContent=disc||t('all_disc');
        wireQuizButtons();
        _shownMilestones.clear(); startTimer(); nextQ(); }
    };
    document.getElementById('newTestBtn').onclick=()=>{ clearActiveSession(); closeOverlay(); _showDiscPage(disc); };
    return;
  }
  _showDiscPage(disc);
}

function _showDiscPage(disc){
  const st=profile.stats[disc||'__all__'];
  const attempts=st?.attempts||[];
  const best=st?.best||0;
  const hasWrong=st?.lastWrong?.length>0;
  const title=disc||t('all_disc');
  const cnt=disc?DATA.disciplines[disc]:DATA.questions.length;

  // build attempts table
  let attHtml='';
  if(attempts.length){
    const rows=attempts.slice().reverse().map((a,i)=>{
      const n=attempts.length-i;
      const cls=a.pct>=80?'hi':a.pct>=50?'mid':'lo';
      const origIdx=attempts.length-1-i;
      return `<tr>
        <td class="att-num">Попытка ${n}</td>
        <td>${a.date}</td>
        <td class="att-score-cell ${cls}">${a.pct}%</td>
        <td>${a.correct}/${a.total}</td>
        <td>${a.time||'—'}</td>
        <td><button class="att-review-btn" data-idx="${origIdx}">Просмотреть</button></td>
      </tr>`;
    }).join('');
    attHtml=`
      <h3 style="font-family:var(--serif);font-size:15px;margin:0 0 10px;color:var(--muted)">
        Предыдущие попытки
      </h3>
      <div style="overflow-x:auto;margin-bottom:18px">
        <table class="att-table">
          <thead><tr>
            <th>#</th><th>Дата</th><th>Результат</th><th>${t('correct')}</th><th>Время</th><th></th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  } else {
    attHtml=`<div class="no-attempts">📋 Попыток ещё не было. Начни первую!</div>`;
  }

  openOverlay(`<div class="modal disc-modal">
    <div class="disc-header">
      <div>
        <h2>${title}</h2>
        <p class="sub" style="margin:2px 0 0">${cnt} вопросов</p>
      </div>
      ${best?`<span class="disc-best">Лучший: ${best}%</span>`:''}
    </div>
    ${attHtml}
    <h3 style="font-family:var(--serif);font-size:15px;margin:0 0 10px">Начать новую попытку</h3>
    <div class="type-filters" id="typeFilters">
      <span class="tf on" data-t="multichoice">🔘 Выбор</span>
      <span class="tf on" data-t="shortanswer">✏️ Ответ</span>
      <span class="tf on" data-t="matching">🔗 Сопоставление</span>
      <span class="tf on" data-t="ordering">↕️ Порядок</span>
    </div>
    <div class="disc-actions">
      <button class="mode-btn" data-m="order"><b>Подряд</b><span>В исходном порядке</span></button>
      <button class="mode-btn" data-m="random"><b>Случайно</b><span>Перемешать вопросы</span></button>
      <button class="mode-btn" data-m="hard"><b>Сложные чаще</b><span>Неверные возвращаются в конец</span></button>
      ${hasWrong?`<button class="mode-btn" data-m="wrong" style="border-color:var(--bad)"><b>⚠ Только ошибки</b><span>Вопросы из прошлой сессии</span></button>`:''}
    </div>
    <button class="modal-x" id="discCancel">Назад</button>
  </div>`);

  // wire type filters
  document.querySelectorAll('.tf').forEach(tf=>tf.onclick=()=>{ playClick(); tf.classList.toggle('on'); });
  // wire mode buttons
  document.querySelectorAll('.mode-btn').forEach(b=>b.onclick=()=>{
    playClick();
    const types=$$('.tf.on').map(t=>t.dataset.t);
    startSession(disc, b.dataset.m, types.length<4?types:null);
  });
  // wire review buttons
  document.querySelectorAll('.att-review-btn').forEach(btn=>btn.onclick=()=>{
    playClick();
    reviewAttempt(disc, +btn.dataset.idx);
  });
  document.getElementById('discCancel').onclick=closeOverlay;
}

function reviewAttempt(disc, attIdx){
  const st=profile.stats[disc||'__all__'];
  const att=st?.attempts?.[attIdx];
  if(!att){ showToast(t('attempt_not_found')); return; }
  const pct=att.pct, n=att.correct, t=att.total;
  const cls=pct>=80?'hi':pct>=50?'mid':'lo';
  const attNum=attIdx+1;

  // Если есть полные ответы — показываем их
  let answerRows='';
  if(att.answers&&att.answers.length){
    answerRows=att.answers.map((a,i)=>{
      const q=DATA.questions[a.qid];
      if(!q) return '';
      const isCorrect=a.result==='correct';
      const isPartial=a.result==='partial';
      const color=isCorrect?'var(--ok)':isPartial?'var(--partial)':'var(--bad)';
      const mark=isCorrect?'✓':isPartial?'~':'✗';
      const userAns=a.userAnswer?`<div class=\'rev-ua\'>'+t('your_answer_lbl')+'<span style="color:${color}">${String(a.userAnswer).slice(0,200)}</span></div>`:'';
      const correctAns=!isCorrect?`<div class="rev-a">${t("correct_lbl")} ${(a.correct||correctOf(q)).slice(0,200)}</div>`:'';
      return `<div class="rev-item" style="animation-delay:${i*.02}s">
        <div class="rev-q"><span style="color:${color};font-weight:700;margin-right:6px">${mark}</span>${stripTags(q.question).slice(0,180)}</div>
        ${userAns}${correctAns}
      </div>`;
    }).join('');
  } else {
    // Старый формат — только неверные
    const wrongIds=new Set(att.wrongIds||[]);
    const wrongQs=DATA.questions.filter((_,i)=>wrongIds.has(i));
    answerRows=wrongQs.slice(0,20).map(q=>`
      <div class="rev-item">
        <div class="rev-q"><span style="color:var(--bad);font-weight:700;margin-right:6px">✗</span>${stripTags(q.question).slice(0,180)}</div>
        <div class=\'rev-a\'>'+t('correct_lbl')+' ${correctOf(q).slice(0,200)}</div>
      </div>`).join('');
  }

  openOverlay(`<div class="modal" style="max-width:560px">
    <h2>Попытка ${attNum} — ${disc||t('all_disc')}</h2>
    <div class="stats-grid" style="margin:14px 0">
      <div class="stat-cell"><div class="stat-num att-score-cell ${cls}">${pct}%</div><div class="stat-lbl">Результат</div></div>
      <div class="stat-cell"><div class="stat-num">${n}/${t}</div><div class="stat-lbl">${t('correct')}</div></div>
      <div class="stat-cell"><div class="stat-num">${att.time||'—'}</div><div class="stat-lbl">Время</div></div>
      <div class="stat-cell"><div class="stat-num date-num">${att.date}</div><div class="stat-lbl">Дата</div></div>
    </div>
    <div class="review-section">
      <h3>'+t('review_breakdown')+'</h3>
      ${answerRows||'<p style=\'color:var(--muted);text-align:center\'>'+t('no_data')+'</p>'}
    </div>
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="btn sm" id="revRetrain" ${att.wrongIds?.length?'':'disabled'}>Тренировать ошибки</button>
      <button class="modal-x" style="margin:0" id="revBack">Назад</button>
    </div>
  </div>`);
  document.getElementById('revBack').onclick=()=>showDiscPage(disc);
  document.getElementById('revRetrain').onclick=()=>{ startSession(disc,'wrong'); };
}

/* ========== CABINET ========== */
function buildCabinet(){
  const discs=Object.keys(DATA.disciplines); const st=profile.stats||{};
  const totalAtt=Object.values(st).reduce((s,v)=>s+(v.attempts?.length||0),0);
  const started=discs.filter(d=>st[d]&&st[d].best>0);
  const done=started.length;
  const avg=done?Math.round(started.reduce((s,d)=>s+(st[d]?.best||0),0)/done):0;
  const bestDisc=done?started.reduce((a,d)=>(!a||st[d].best>st[a].best)?d:a,null):null;
  const worstDisc=done?started.reduce((a,d)=>(!a||st[d].best<st[a].best)?d:a,null):null;

  function sparkline(disc){
    const atts=st[disc]?.attempts||[];
    if(atts.length<2) return '';
    const pts=atts.slice(-8);
    const w=80,h=24,pad=2;
    const coords=pts.map((a,i)=>{
      const x=pad+(i/(pts.length-1))*(w-pad*2);
      const y=h-pad-(a.pct/100)*(h-pad*2);
      return x+','+y;
    }).join(' ');
    const lastPct=pts[pts.length-1].pct;
    const col=lastPct>=80?'var(--ok)':lastPct>=50?'var(--partial)':'var(--bad)';
    const lastCoord=coords.split(' ').pop().split(',');
    return '<svg viewBox="0 0 '+w+' '+h+'" style="width:80px;height:24px;flex-shrink:0"><polyline points="'+coords+'" stroke="'+col+'" stroke-width="1.5" fill="none" opacity=".8"/><circle cx="'+lastCoord[0]+'" cy="'+lastCoord[1]+'" r="2.5" fill="'+col+'"/></svg>';
  }

  function radarChart(){
    const items=discs.slice(0,8).map(d=>({name:d.split(' ')[0],val:(st[d]?.best||0)/100}));
    const n=items.length,cx=100,cy=100,r=70;
    const angle=(i)=>-Math.PI/2+(2*Math.PI/n)*i;
    const pt=(i,scale)=>({x:cx+r*scale*Math.cos(angle(i)),y:cy+r*scale*Math.sin(angle(i))});
    const grid=[.25,.5,.75,1].map(s=>'<polygon points="'+items.map((_,i)=>{const p=pt(i,s);return p.x+','+p.y;}).join(' ')+'" stroke="var(--line)" stroke-width="1" fill="none" opacity=".5"/>').join('');
    const axes=items.map((_,i)=>{const p=pt(i,1);return '<line x1="'+cx+'" y1="'+cy+'" x2="'+p.x+'" y2="'+p.y+'" stroke="var(--line)" stroke-width="1" opacity=".4"/>';}).join('');
    const shape='<polygon points="'+items.map((item,i)=>{const p=pt(i,item.val);return p.x+','+p.y;}).join(' ')+'" fill="var(--accent)" fill-opacity=".25" stroke="var(--accent)" stroke-width="2"/>';
    const labels=items.map((item,i)=>{const p=pt(i,1.22);return '<text x="'+p.x+'" y="'+p.y+'" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="var(--muted)">'+item.name+'</text>';}).join('');
    const dots=items.map((item,i)=>{const p=pt(i,item.val);return '<circle cx="'+p.x+'" cy="'+p.y+'" r="3" fill="var(--accent2)"/>';}).join('');
    return '<svg viewBox="0 0 200 200" style="width:100%;max-width:200px;margin:0 auto;display:block">'+grid+axes+shape+dots+labels+'</svg>';
  }

  const rows=discs.map(d=>{
    const b=st[d]?.best||0;
    const col=b>=80?'var(--ok)':b>=50?'var(--partial)':b>0?'var(--bad)':'var(--muted)';
    return '<div class="disc-row" data-d="'+d+'">'+
      '<span class="dr-name">'+d+'</span>'+
      sparkline(d)+
      '<span class="dr-bar"><i style="width:'+b+'%;background:'+col+'"></i></span>'+
      '<span class="dr-pct" style="color:'+(b?col:'var(--muted)')+'">'+  (b?b+'%':'—')+'</span>'+
    '</div>';
  }).join('');

  document.getElementById('cabinet').innerHTML='<div class="cab-card">'+
    '<div class="cab-header">'+
      '<div class="cab-avatar">'+(profile.name[0]||'?').toUpperCase()+'</div>'+
      '<div><h2 style="margin:0">'+profile.name+'</h2><div style="font-size:13px;color:var(--muted);margin-top:2px">Личный кабинет</div></div>'+
    '</div>'+
    '<div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin:16px 0">'+
      '<div class="stat-cell"><div class="stat-num">'+(profile.sessions||0)+'</div><div class="stat-lbl">Тестов</div></div>'+
      '<div class="stat-cell"><div class="stat-num">'+done+'/'+discs.length+'</div><div class="stat-lbl">Начато</div></div>'+
      '<div class="stat-cell"><div class="stat-num" style="color:'+(avg>=80?'var(--ok)':avg>=50?'var(--partial)':'var(--bad)')+'">'+avg+'%</div><div class="stat-lbl">Средний</div></div>'+
      '<div class="stat-cell"><div class="stat-num">'+totalAtt+'</div><div class="stat-lbl">Попыток</div></div>'+
    '</div>'+
    (done>=3?'<div style="margin:0 0 20px"><div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px">'+t('radar_progress')+'</div>'+radarChart()+'</div>':'')+
    (bestDisc?'<div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">'+
      '<div style="flex:1;min-width:140px;background:var(--ok-soft);border:1.5px solid var(--ok);border-radius:var(--r);padding:10px 12px">'+
        '<div style="font-size:11px;color:var(--ok);font-weight:700;margin-bottom:3px">'+(t('best_disc_lbl'))+'</div>'+
        '<div style="font-size:13px">'+bestDisc+'</div>'+
        '<div style="font-size:18px;font-weight:700;color:var(--ok)">'+st[bestDisc].best+'%</div>'+
      '</div>'+
      '<div style="flex:1;min-width:140px;background:var(--bad-soft);border:1.5px solid var(--bad);border-radius:var(--r);padding:10px 12px">'+
        '<div style="font-size:11px;color:var(--bad);font-weight:700;margin-bottom:3px">'+(t('needs_work_lbl'))+'</div>'+
        '<div style="font-size:13px">'+worstDisc+'</div>'+
        '<div style="font-size:18px;font-weight:700;color:var(--bad)">'+st[worstDisc].best+'%</div>'+
      '</div>'+
    '</div>':'')+
    '<div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px">'+(t('by_disc_lbl'))+'</div>'+
    '<div id="discRows">'+rows+'</div>'+
    '<div class="actions" style="margin-top:20px;flex-wrap:wrap">'+
      '<button class="btn ghost" id="cabHomeBtn">'+t('to_home')+'</button>'+
      '<button class="btn ghost sm" id="cabExportBtn">'+t('export_btn')+'</button>'+
      '<button class="btn ghost sm" id="cabImportBtn">'+t('import_btn')+'</button>'+
      '<button class="btn ghost sm" id="cabPassBtn">'+t('change_password')+'</button>'+
      '<button class="btn ghost sm" id="cabLogoutBtn">'+t('logout_btn')+'</button>'+
      '<button class="btn ghost sm" id="cabResetBtn" style="color:var(--bad);border-color:var(--bad)">'+t('reset_btn')+'</button>'+
    '</div></div>';

  show('cabinet');
  document.getElementById('cabHomeBtn').onclick=()=>{show('home');buildHome();};
  document.getElementById('cabPassBtn').onclick=()=>{ playClick(); if(!_authToken){showToast(t('cab_login_only'));return;} offerSetPassword(); };
  document.getElementById('cabLogoutBtn').onclick=()=>{
    playClick();
    localStorage.removeItem('sb_access'); localStorage.removeItem('sb_refresh');
    _authToken=null; initGate();
  };
  document.getElementById('cabExportBtn').onclick=()=>{
    playClick();
    const data=JSON.stringify({name:profile.name,stats:profile.stats,sessions:profile.sessions,theme:profile.theme,uid:getUid()});
    const code=btoa(encodeURIComponent(data));
    openOverlay('<div class="modal" style="max-width:480px"><h2>'+t('export_title')+'</h2><p class=\'sub\'>'+t('export_hint')+'</p><textarea id="exportCode" style="width:100%;height:100px;background:var(--bg2);color:var(--ink);border:1.5px solid var(--line);border-radius:var(--r);padding:10px;font-family:monospace;font-size:12px;resize:none;outline:none" readonly>'+code+'</textarea><div style="display:flex;gap:10px;margin-top:12px"><button class="btn" style="flex:1;justify-content:center" id="copyCode">'+(t('copy_btn'))+'</button><button class="modal-x" style="margin:0" onclick="closeOverlay()">'+(t('close_btn'))+'</button></div></div>');
    document.getElementById('exportCode').select();
    document.getElementById('copyCode').onclick=()=>{ navigator.clipboard.writeText(code).then(()=>showToast(t('code_copied'))).catch(()=>{document.getElementById('exportCode').select();document.execCommand('copy');showToast(t('copied'));}); };
  };
  document.getElementById('cabImportBtn').onclick=()=>{
    playClick();
    openOverlay('<div class="modal" style="max-width:480px"><h2>'+t('import_title')+'</h2><p class=\'sub\'>'+t('import_hint')+'</p><textarea id=\'importCode\' placeholder=\'...\' style="width:100%;height:100px;background:var(--bg2);color:var(--ink);border:1.5px solid var(--line);border-radius:var(--r);padding:10px;font-family:monospace;font-size:12px;resize:none;outline:none"></textarea><div style="display:flex;gap:10px;margin-top:12px"><button class="btn" style="flex:1;justify-content:center" id="doImport">'+(t('apply_btn'))+'</button><button class="modal-x" style="margin:0" onclick="closeOverlay()">'+(t('cancel_btn'))+'</button></div></div>');
    document.getElementById('doImport').onclick=()=>{
      const code=(document.getElementById('importCode').value||'').trim();
      try{
        const data=JSON.parse(decodeURIComponent(atob(code)));
        if(!data.stats) throw new Error('bad');
        if(data.uid) localStorage.setItem('trainer_uid',data.uid);
        profile.name=data.name||profile.name; profile.stats=data.stats;
        profile.sessions=data.sessions||0;
        if(data.theme) applyTheme(data.theme);
        save(); closeOverlay(); buildCabinet(); showToast(t('imported'));
        pullFromCloud(()=>{ buildCabinet(); showToast(t('cloud_imported')); });
      }catch(e){ showToast(t('bad_code')); }
    };
  };
  document.getElementById('cabResetBtn').onclick=()=>{
    playClick();
    openOverlay('<div class="modal" style="text-align:center;max-width:380px"><h2>'+t('reset_title')+'</h2><p class=\'sub\'>'+t('reset_warn')+'</p><div style="display:flex;gap:10px;margin-top:16px"><button class="btn bad-btn" style="flex:1;justify-content:center" id="confirmReset">'+(t('yes_reset'))+'</button><button class="btn ghost" style="flex:1;justify-content:center" id="cancelReset">'+(t('cancel_btn'))+'</button></div></div>');
    document.getElementById('confirmReset').onclick=async()=>{
      if(_authToken&&getUid()!=='anonymous'){
        // Не удаляем запись, а обнуляем — иначе другие устройства не узнают о сбросе
        await fetch(SB_URL+'/rest/v1/progress?on_conflict=user_id',{
          method:'POST',
          headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+_authToken,'Prefer':'resolution=merge-duplicates,return=minimal'},
          body:JSON.stringify({user_id:getUid(),data:{name:'',stats:{},sessions:0,theme:'dark',activeSessions:{},updatedAt:Date.now(),reset:true},updated_at:new Date().toISOString()})
        }).catch(()=>{});
      }
      localStorage.removeItem(LS);
      profile={name:'',stats:{},sessions:0,theme:'dark',activeSessions:{},updatedAt:Date.now()};
      applyTheme('dark'); save(); closeOverlay(); buildHome(); show('home'); owlNeutral(t('progress_reset'));
    };
    document.getElementById('cancelReset').onclick=closeOverlay;
  };
  document.querySelectorAll('.disc-row').forEach(row=>{ row.onclick=()=>showDiscPage(row.dataset.d); });
}

async function sbSendOtp(email){
  const res=await fetch(`${SB_URL}/auth/v1/otp`,{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SB_KEY},
    body:JSON.stringify({email,create_user:true})
  });
  if(!res.ok){
    const err=await res.clone().text();
    console.warn('OTP send error:',res.status,err);
    tgLog('otp','Ошибка отправки кода',{email,status:res.status,error:err});
  } else {
    tgLog('otp','Код запрошен',{email});
  }
  return res.ok;
}

async function sbVerifyOtp(email,token){
  const res=await fetch(`${SB_URL}/auth/v1/verify`,{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':SB_KEY},
    body:JSON.stringify({email,token,type:'email'})
  });
  if(!res.ok){
    const err=await res.clone().text();
    console.warn('OTP verify error:',res.status,err);
    tgLog('auth','Неверный код входа',{email,status:res.status,error:err});
    return null;
  }
  const data=await res.json();
  tgLog('auth','Успешный вход',{email});
  return data;
}

async function sbSignUp(email,password){
  try{
    const res=await fetch(`${SB_URL}/auth/v1/signup`,{
      method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY},
      body:JSON.stringify({email,password})
    });

/* ========== PASSWORD STRENGTH ========== */
const PW_LEVELS=[
  {min:0,label:'УЖАС',color:'#e02020',width:8},
  {min:1,label:'Очень слабый',color:'#e05a20',width:20},
  {min:2,label:'Слабый',color:'#e09020',width:36},
  {min:3,label:'Средний',color:'#d4c020',width:52},
  {min:4,label:'Хороший',color:'#9ac030',width:68},
  {min:5,label:'Сильный',color:'#4eb860',width:84},
  {min:6,label:'ЛЕГЕНДАРНЫЙ',color:'gold',width:100,legendary:true}
];
function pwScore(p){
  if(!p) return -1;
  let s=0;
  if(p.length>=8) s++;
  if(p.length>=12) s++;
  if(/[a-zа-яё]/.test(p)&&/[A-ZА-ЯЁ]/.test(p)) s++;
  if(/\d/.test(p)) s++;
  if(/[^a-zA-Zа-яА-ЯёЁ0-9]/.test(p)) s++;
  if(p.length>=16&&s>=4) s++;
  // штрафы за совсем плохие пароли
  if(p.length<6) s=0;
  if(/^(.)\1+$/.test(p)||/^(1234|qwer|пароль|password|0000)/i.test(p)) s=0;
  return Math.min(s,6);
}
function updatePwMeter(p){
  const fill=document.getElementById('pwFill');
  const label=document.getElementById('pwLabel');
  if(!fill||!label) return;
  const s=pwScore(p);
  if(s<0){ fill.style.width='0'; fill.classList.remove('pw-legendary'); label.textContent=''; label.classList.remove('legendary'); return; }
  const lv=PW_LEVELS[s];
  fill.style.width=lv.width+'%';
  fill.classList.toggle('pw-legendary',!!lv.legendary);
  if(!lv.legendary) fill.style.background=lv.color;
  else fill.style.background='';
  label.textContent=lv.label;
  label.classList.toggle('legendary',!!lv.legendary);
  if(!lv.legendary) label.style.color=lv.color;
  else label.style.color='';
}

async function sbRefresh(){
  const r=localStorage.getItem('sb_refresh'); if(!r) return null;
  try{
    const res=await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`,{
      method:'POST',headers:{'Content-Type':'application/json','apikey':SB_KEY},
      body:JSON.stringify({refresh_token:r})
    });
    if(!res.ok) return null;
    const d=await res.json();
    if(d.access_token){
      localStorage.setItem('sb_access',d.access_token);
      if(d.refresh_token) localStorage.setItem('sb_refresh',d.refresh_token);
      return d.access_token;
    }
  }catch(e){}
  return null;
}

async function getValidToken(){
  let t=localStorage.getItem('sb_access');
  if(t){
    // проверяем не протух ли токен по exp полю
    try{
      const payload=JSON.parse(atob(t.split('.')[1]));
      const expiresSoon=payload.exp<(Date.now()/1000)+60; // протух или истекает через минуту
      if(!expiresSoon) return t;
    }catch(e){}
    // токен протух — обновляем
    const refreshed=await sbRefresh();
    if(refreshed) return refreshed;
  }
  return await sbRefresh();
}

  $id('toLogin').onclick=()=>{ playClick(); gateShow('gateLogin'); };

        // регистрация с подтверждением — доустанавливаем пароль
        sbSetPassword(pendingPw);
      } else {
        // вход по коду (забыл пароль) — предлагаем задать новый
        setTimeout(()=>offerSetPassword(),600);
      }
    } else {
      $id('codeGo').disabled=false; $id('codeGo').textContent=t('sign_in');
      showToast(t('code_error'));
    }
  };
  $id('codeIn').onkeydown=e=>{ if(e.key==='Enter') $id('codeGo').click(); };
  $id('emailBack').onclick=()=>{ playClick(); gateShow('gateOtp'); };

  /* ---- ГОСТЬ ---- */
  $id('guestBtn').onclick=()=>{
    playClick();
    tgLog('guest','Вход как гость',{});
    openOverlay(`<div class="modal" style="max-width:380px;text-align:center">
      <h2>${t('guest_title')}</h2>
      <p class="sub" style="color:var(--bad)">${t('guest_warn')}</p>
      <p class="sub">${t('guest_login_hint')}</p>
      <div style="display:flex;gap:10px;margin-top:16px">
        <button class="btn" style="flex:1;justify-content:center" id="guestConfirm">${t('continue_btn')}</button>
        <button class="btn ghost" style="flex:1;justify-content:center" onclick="closeOverlay()">${t('cancel_btn')}</button>
      </div>
    </div>`);
    document.getElementById('guestConfirm').onclick=()=>{
      closeOverlay();
      profile={name:t('guest_name'),stats:{},sessions:0,theme:'dark',activeSessions:{}};
      save();
      buildHome(); show('home'); owlNeutral(t('welcome_back'));
    };
  };

  setTimeout(()=>$id('emailIn').focus(),100);
}

let _pendingPassword=null;

/* Предложить задать пароль после входа по коду */
function offerSetPassword(){
  openOverlay(`<div class="modal" style="max-width:420px">
    <h2>${t('set_password_title')}</h2>
    <p class="sub">${t('set_password_hint')}</p>
    <input class="gate-input" id="newPassIn" placeholder="Новый пароль" type="password" autocomplete="new-password">
    <div class="pw-meter"><i id="pwFill"></i></div>
    <div class="pw-label" id="pwLabel"></div>
    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn" style="flex:1;justify-content:center" id="setPassGo">Сохранить</button>
      <button class="btn ghost" style="flex:1;justify-content:center" onclick="closeOverlay()">Позже</button>
    </div>
  </div>`);
  const inp=document.getElementById('newPassIn');
  inp.oninput=()=>updatePwMeter(inp.value);
  inp.onkeydown=e=>{ if(e.key==='Enter') document.getElementById('setPassGo').click(); };
  document.getElementById('setPassGo').onclick=async()=>{
    playClick();
    const p=inp.value||'';
    if(p.length<6){ showToast(t('password_short')); return; }
    if(pwScore(p)<2){ showToast(t('password_weak')); return; }
    const btn=document.getElementById('setPassGo');
    btn.disabled=true; btn.textContent='Сохраняем...';
    const ok=await sbSetPassword(p);
    closeOverlay();
    showToast(ok?t('password_saved'):t('password_error'));
  };
  setTimeout(()=>inp.focus(),100);
}

function goHome(){
  buildHome(); show('home'); owlNeutral(t('welcome'));
}

/* ========== WIRE HOME BUTTONS ========== */
document.getElementById('cabBtn').onclick=()=>{ playClick(); buildCabinet(); };
document.getElementById('themeBtn').onclick=()=>{ playClick(); openThemePicker(); };
document.getElementById('langBtn').onclick=()=>openLangPicker();
document.getElementById('soundBtn').onclick=()=>{
  playClick();
  profile.soundEnabled = profile.soundEnabled===false ? true : false;
  document.getElementById('soundBtn').textContent = profile.soundEnabled===false ? '🔇' : '🔊';
  save();
};
document.getElementById('soundBtn').textContent = profile.soundEnabled===false ? '🔇' : '🔊';
document.getElementById('owlSvg').addEventListener('click',()=>{ playClick(); const msgs=['Ухуху! Ты справишься!','Совы мудрые. Ты тоже!','Давай учиться!','Мне нравится твой прогресс!','🦉 Учись усердно!']; owlMsg(msgs[Math.floor(Math.random()*msgs.length)]); document.getElementById('owlSvg').style.animation='owlBounce .6s ease'; setTimeout(()=>document.getElementById('owlSvg').style.animation='owlWiggle 3s ease-in-out infinite',700); });

/* ========== BOOT ========== */
document.getElementById('owlSvg').innerHTML=buildOwl(80).match(/<svg[^>]*>(.*)<\/svg>/s)?.[1]||'';
(async()=>{
  const token=await getValidToken();
  if(token){
    const user=await sbGetUser(token);
    if(user){
      _authToken=token;
      localStorage.setItem('trainer_uid',user.id);
      if(!profile.name){ profile.name=user.email.split('@')[0]; save(); }
      buildHome(); show('home'); owlNeutral(t('welcome'));
      updateLangBtn();
      await pullFromCloud(()=>{ buildHome(); });
      showChangelog();
      return;
    }
  }
  // токен невалиден — на экран входа
  localStorage.removeItem('sb_access');
  localStorage.removeItem('sb_refresh');
  initGate();
})();
</script>
